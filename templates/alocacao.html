<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alocação - Janeiro 2025</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="container">
    <!-- Cabeçalho com logotipo e filtros -->
    <div class="header">
      <div class="logo">
        <img src="/static/logoclaro.png" alt="Logo">
      </div>
      <div class="filters-container">
        <div class="filters">
          <div class="filter-row">
            <select id="tipo-projeto-atividade">
              <option>Tipo Projeto/Atividade</option>
              <option>Projeto</option>
              <option>Atividade</option>
            </select>
            <select id="projeto">
              <option>Projeto</option>
              <option>Projeto A</option>
              <option>Projeto B</option>
            </select>
            <select id="atividade">
              <option>Atividade</option>
              <option>Atividade 1</option>
              <option>Atividade 2</option>
            </select>
          </div>
          <div class="filter-row">
            <div class="periodo">
              <input type="date" id="data-inicio" placeholder="Data Início">
              <input type="date" id="data-fim" placeholder="Data Fim">
            </div>
            <input type="number" id="qtd-horas" placeholder="Qtd Horas" min="0">
          </div>
        </div>
        <button onclick="alocar()">Alocar</button>
      </div>
    </div>

    <!-- Navegação e título do calendário -->
    <div class="calendar-nav">
      <button onclick="previousMonth()">← Anterior</button>
      <h1 class="calendar-title">JANEIRO de 2025</h1>
      <button onclick="nextMonth()">Próximo →</button>
    </div>

    <!-- Calendário -->
    <div class="calendar">
      <div class="calendar-header">
        <div class="day">Dom</div>
        <div class="day">Seg</div>
        <div class="day">Ter</div>
        <div class="day">Qua</div>
        <div class="day">Qui</div>
        <div class="day">Sex</div>
        <div class="day">Sáb</div>
      </div>

      <div class="calendar-days">
        <!-- 1º de janeiro de 2025 é quarta-feira, então 3 células vazias -->
        <div class="day empty" data-date=""></div>
        <div class="day empty" data-date=""></div>
        <div class="day empty" data-date=""></div>
        <!-- Dias do mês -->
        <div class="day highlighted" data-date="2025-01-01">1</div>
        <div class="day highlighted" data-date="2025-01-02">2</div>
        <div class="day highlighted" data-date="2025-01-03">3</div>
        <div class="day highlighted" data-date="2025-01-04">4</div>
        <div class="day highlighted" data-date="2025-01-05">5</div>
        <div class="day" data-date="2025-01-06">6</div>
        <div class="day" data-date="2025-01-07">7</div>
        <div class="day" data-date="2025-01-08">8</div>
        <div class="day" data-date="2025-01-09">9</div>
        <div class="day" data-date="2025-01-10">10</div>
        <div class="day" data-date="2025-01-11">11</div>
        <div class="day" data-date="2025-01-12">12</div>
        <div class="day" data-date="2025-01-13">13</div>
        <div class="day" data-date="2025-01-14">14</div>
        <div class="day" data-date="2025-01-15">15</div>
        <div class="day" data-date="2025-01-16">16</div>
        <div class="day" data-date="2025-01-17">17</div>
        <div class="day" data-date="2025-01-18">18</div>
        <div class="day" data-date="2025-01-19">19</div>
        <div class="day" data-date="2025-01-20">20</div>
        <div class="day" data-date="2025-01-21">21</div>
        <div class="day" data-date="2025-01-22">22</div>
        <div class="day" data-date="2025-01-23">23</div>
        <div class="day" data-date="2025-01-24">24</div>
        <div class="day" data-date="2025-01-25">25</div>
        <div class="day" data-date="2025-01-26">26</div>
        <div class="day" data-date="2025-01-27">27</div>
        <div class="day" data-date="2025-01-28">28</div>
        <div class="day" data-date="2025-01-29">29</div>
        <div class="day" data-date="2025-01-30">30</div>
        <div class="day" data-date="2025-01-31">31</div>
      </div>
    </div>

    <!-- Barra inferior com contador -->
    <div class="footer-bar">
      <button class="add-btn">+</button>
      <span class="counter">45</span>
    </div>
  </div>

  <script>
    // Funções de navegação e alocação
    function previousMonth() {
      // Lógica para mudar para o mês anterior
    }

    function nextMonth() {
      // Lógica para mudar para o próximo mês
    }

    function alocar() {
      // Lógica para alocar (placeholder)
    }

    // Funcionalidade de seleção de células
    const days = document.querySelectorAll('.calendar-days .day:not(.empty)');
    const dataInicioInput = document.getElementById('data-inicio');
    const dataFimInput = document.getElementById('data-fim');
    const counter = document.querySelector('.counter');
    let lastSelectedDay = null;

    days.forEach(day => {
      day.addEventListener('click', (e) => {
        const isShiftPressed = e.shiftKey;
        const isCtrlPressed = e.ctrlKey;

        if (!isShiftPressed && !isCtrlPressed) {
          // Clique simples: limpa todas as seleções e seleciona apenas o dia clicado
          days.forEach(d => d.classList.remove('selected'));
          day.classList.add('selected');
          lastSelectedDay = day;
        } else if (isCtrlPressed) {
          // Ctrl: adiciona ou remove o dia da seleção
          day.classList.toggle('selected');
          lastSelectedDay = day;
        } else if (isShiftPressed && lastSelectedDay) {
          // Shift: seleciona um intervalo contínuo entre o último dia selecionado e o dia clicado
          const allDays = Array.from(days);
          const startIndex = allDays.indexOf(lastSelectedDay);
          const endIndex = allDays.indexOf(day);
          const minIndex = Math.min(startIndex, endIndex);
          const maxIndex = Math.max(startIndex, endIndex);

          // Limpa seleções anteriores, mas mantém as que já estavam com Ctrl
          days.forEach(d => {
            if (!d.classList.contains('selected')) {
              d.classList.remove('selected');
            }
          });

          // Seleciona o intervalo
          for (let i = minIndex; i <= maxIndex; i++) {
            allDays[i].classList.add('selected');
          }
        }

        // Atualiza o contador e os campos de data
        updateSelection();
      });
    });

    function updateSelection() {
      const selectedDays = document.querySelectorAll('.calendar-days .day.selected');
      counter.textContent = selectedDays.length;

      if (selectedDays.length > 0) {
        const dates = Array.from(selectedDays)
          .map(day => new Date(day.getAttribute('data-date')))
          .filter(date => !isNaN(date));
        
        if (dates.length > 0) {
          const minDate = new Date(Math.min(...dates));
          const maxDate = new Date(Math.max(...dates));

          // Formata as datas no formato YYYY-MM-DD
          dataInicioInput.value = minDate.toISOString().split('T')[0];
          dataFimInput.value = maxDate.toISOString().split('T')[0];
        } else {
          dataInicioInput.value = '';
          dataFimInput.value = '';
        }
      } else {
        dataInicioInput.value = '';
        dataFimInput.value = '';
      }
    }
  </script>
</body>
</html>
