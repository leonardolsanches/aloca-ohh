<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário de Alocação - Janeiro 2025</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="calendar-container">
    <h2 class="calendar-title">JANEIRO de 2025</h2>
    <div class="calendar">
      <!-- Cabeçalho: Dias da semana -->
      <div class="calendar-header">
        <div class="day">Dom</div>
        <div class="day">Seg</div>
        <div class="day">Ter</div>
        <div class="day">Qua</div>
        <div class="day">Qui</div>
        <div class="day">Sex</div>
        <div class="day">Sáb</div>
      </div>

      <!-- Dias do mês -->
      <div class="calendar-days">
        <!-- Espaços vazios: 1º de janeiro é quarta-feira, então precisamos de 3 espaços (Dom, Seg, Ter) -->
        <div class="day empty"></div>
        <div class="day empty"></div>
        <div class="day empty"></div>
        <!-- Dias do mês -->
        <div class="day highlighted">1</div>
        <div class="day highlighted">2</div>
        <div class="day highlighted">3</div>
        <div class="day highlighted">4</div>
        <div class="day highlighted">5</div>
        <div class="day">6</div>
        <div class="day">7</div>
        <div class="day">8</div>
        <div class="day">9</div>
        <div class="day">10</div>
        <div class="day">11</div>
        <div class="day">12</div>
        <div class="day">13</div>
        <div class="day">14</div>
        <div class="day">15</div>
        <div class="day">16</div>
        <div class="day">17</div>
        <div class="day">18</div>
        <div class="day">19</div>
        <div class="day">20</div>
        <div class="day">21</div>
        <div class="day">22</div>
        <div class="day">23</div>
        <div class="day">24</div>
        <div class="day">25</div>
        <div class="day">26</div>
        <div class="day">27</div>
        <div class="day">28</div>
        <div class="day">29</div>
        <div class="day">30</div>
        <div class="day">31</div>
      </div>
    </div>
  </div>
</body>
</html>
