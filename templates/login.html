<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Alocação</title>
  <link rel="stylesheet" href="./static/css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <img src="./static/logoclaro.png" alt="Logo">
    </div>
    <h2>Login</h2>
    <div>
      <label for="profile">Perfil</label>
      <select id="profile" required>
        <option value="" disabled selected>Selecione seu perfil</option>
        <option value="colaborador">Colaborador</option>
        <option value="terceiro">Terceiro</option>
        <option value="gestor">Gestor</option>
      </select>
    </div>
    <div>
      <label for="username">Usuário</label>
      <input type="text" id="username" placeholder="Digite seu usuário" required>
    </div>
    <div>
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Digite sua senha" required>
    </div>
    <button onclick="login()">Entrar</button>
  </div>

  <script>
    function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const profile = document.getElementById('profile').value;

      // Validação simples (para teste)
      if (username === 'admin' && password === 'password' && profile) {
        window.location.href = 'alocacao.html';
      } else {
        alert('Credenciais inválidas. Use "admin" como usuário e senha, e selecione um perfil.');
      }
    }
  </script>
</body>
</html>
